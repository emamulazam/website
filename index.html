<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Offer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .discount-btn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }
        .discount-btn:hover {
            background-color: #45a049;
        }
        .social-icons {
            margin-bottom: 20px;
        }
        .social-icons a img {
            width: 60px;
            margin: 0 10px;
        }
        .social-text {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
            text-decoration: none;
        }
        .social-text:hover {
            color: #007bb5;
        }
        .discount-message {
            font-size: 24px;
            margin-top: 20px;
            display: none; /* Hidden by default */
        }
        .info-message {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
        }
        .package-list {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        .package-item {
            margin: 10px 0;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            display: inline-block;
            width: 200px; /* Fixed width for uniformity */
            transition: background-color 0.3s;
        }
        .package-item:hover {
            background-color: #f0f0f0; /* Highlight on hover */
        }
        .basic { border-color: #4CAF50; } /* Basic package color */
        .premium { border-color: #007bb5; } /* Premium package color */
        .pro-max { border-color: #f39c12; } /* Pro Max package color */
    </style>
    <!-- Include the html2canvas library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/0.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="info-message">
        Please send the screenshot to <strong>01701018524</strong><br>
        Package without discount:
    </div>

    <div class="package-list">
        <div class="package-item basic">499 Basic</div>
        <div class="package-item premium">750 Premium</div>
        <div class="package-item pro-max">999 Pro Max</div>
    </div>

    <div class="social-icons">
        <div>
            <a href="https://www.facebook.com/manjurulcreation" target="_blank">
                <img src="fb.jpg" alt="Facebook">
            </a>
            <a href="https://www.facebook.com/manjurulcreation" target="_blank" class="social-text">Manjurul Creation</a>
        </div>
        <div>
            <a href="https://www.youtube.com/@manjurulcreation" target="_blank">
                <img src="youtube.jpg" alt="YouTube">
            </a>
            <a href="https://www.youtube.com/@manjurulcreation" target="_blank" class="social-text">Manjurul Creation</a>
        </div>
    </div>

    <h1>Click the Button to Reveal Your Discount!</h1>
    <button class="discount-btn" onclick="revealDiscount()">Get Discount</button>

    <div class="discount-message" id="discountMessage">
        You won a <span id="discountAmount"></span>% discount!
    </div>

    <script>
        let clicked = false;

        function revealDiscount() {
            if (clicked) {
                alert("You can only roll once!");
                return;
            }
            clicked = true;

            const discount = Math.floor(Math.random() * 41) + 10; // Generates a discount between 10% and 50%
            document.getElementById("discountAmount").textContent = discount;
            document.getElementById("discountMessage").style.display = "block";
        }
    </script>

</body>
</html>
