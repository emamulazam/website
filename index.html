<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Offer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .discount-btn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .discount-btn:hover {
            background-color: #45a049;
        }
        .form-container {
            display: none;
            margin-top: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            margin: 10px 0;
            width: 80%;
            max-width: 300px;
        }
        .submit-btn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #008CBA;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .submit-btn:hover {
            background-color: #007bb5;
        }
        .social-icons {
            margin-bottom: 20px;
        }
        .social-icons a img {
            width: 60px;
            margin: 0 10px;
        }
        .social-text {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
            text-decoration: none;
        }
        .social-text:hover {
            color: #007bb5;
        }
    </style>
</head>
<body>

    <div class="social-icons">
        <div>
            <a href="https://www.facebook.com/manjurulcreation" target="_blank">
                <img src="fb.jpg" alt="Facebook">
            </a>
            <a href="https://www.facebook.com/manjurulcreation" target="_blank" class="social-text">Manjurul Creation</a>
        </div>
        <div>
            <a href="https://www.youtube.com/@manjurulcreation" target="_blank">
                <img src="youtube.jpg" alt="YouTube">
            </a>
            <a href="https://www.youtube.com/@manjurulcreation" target="_blank" class="social-text">Manjurul Creation</a>
        </div>
    </div>

    <h1>Click the Button to Reveal Your Discount!</h1>
    <button class="discount-btn" onclick="revealDiscount()">Get Discount</button>

    <div class="form-container" id="formContainer">
        <h2>You won a <span id="discountAmount"></span>% discount!</h2>
        <p>Please fill in your details below (optional):</p>
        <input type="text" id="name" placeholder="Enter your name"><br>
        <input type="text" id="phone" placeholder="Enter your WhatsApp number"><br>
        <input type="email" id="email" placeholder="Enter your email"><br>
        <button class="submit-btn" onclick="submitForm()">Submit</button>
    </div>

    <script>
        let clicked = false;

        function revealDiscount() {
            if (clicked) {
                alert("You can only roll once!");
                return;
            }
            clicked = true;

            const discount = Math.floor(Math.random() * 41) + 10;
            document.getElementById("discountAmount").textContent = discount;
            document.getElementById("formContainer").style.display = "block";
        }

        function submitForm() {
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const email = document.getElementById("email").value;
            const discount = document.getElementById("discountAmount").textContent;

            fetch('/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, phone, email, discount })
            })
            .then(response => response.text())
            .then(message => alert(message))
            .catch(error => console.error('Error:', error));
        }
    </script>

</body>
</html>
