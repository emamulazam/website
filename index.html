<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Generator</title>
</head>
<body>

    <!-- Top Social Media Icons -->
    <div style="text-align: center; margin-bottom: 20px;">
        <a href="https://www.facebook.com/manjurulcreation" target="_blank">
            <img src="https://www.iconfinder.com/data/icons/social-media-flat-7/64/Social-media_Facebook-512.png" alt="Facebook" width="40" style="margin-right: 10px;">
        </a>
        <a href="https://www.youtube.com/@manjurulcreation" target="_blank">
            <img src="https://www.iconfinder.com/data/icons/social-media-flat-7/64/Social-media_Youtube-512.png" alt="YouTube" width="40">
        </a>
    </div>

    <!-- Discount Button -->
    <div style="text-align: center;">
        <button id="discountButton" onclick="getDiscount()" style="font-size: 18px; padding: 10px 20px;">
            Click to Get Discount
        </button>
    </div>

    <script>
        let clicked = false;

        function getDiscount() {
            if (clicked) {
                alert("You can only roll once!");
                return;
            }

            // Generate a random discount between 10% and 50%
            const discount = Math.floor(Math.random() * (50 - 10 + 1)) + 10;
            alert("Congratulations! You've got a " + discount + "% discount!");

            // Get user input
            const name = prompt("Enter your name (optional):");
            const whatsappNumber = prompt("Enter your WhatsApp number (optional):");
            const email = prompt("Enter your email (optional):");

            // Prevent multiple clicks
            clicked = true;

            // Prepare data to save as CSV
            const data = [
                ["Name", "WhatsApp Number", "Email", "Discount"],
                [name || "N/A", whatsappNumber || "N/A", email || "N/A", discount + "%"]
            ];

            // Convert data to CSV format
            const csvContent = data.map(e => e.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);

            // Create a download link
            const link = document.createElement("a");
            link.href = url;
            link.download = "data.csv";
            link.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
